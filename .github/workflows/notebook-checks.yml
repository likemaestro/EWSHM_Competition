name: Notebook checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate notebook JSON
        shell: bash
        run: |
          set -euo pipefail
          git ls-files | grep -E '\.ipynb$' | while IFS= read -r notebook; do
            python3 -m json.tool "$notebook" >/dev/null
          done
