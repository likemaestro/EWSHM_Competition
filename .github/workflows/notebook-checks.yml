name: Notebook checks

on:
  pull_request:
    paths:
      - "notebooks/**/*.ipynb"
  workflow_dispatch:

jobs:
  validate:
    name: Validate notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate notebook JSON
        shell: bash
        run: |
          set -euo pipefail
          git ls-files 'notebooks/**/*.ipynb' | while IFS= read -r notebook; do
            python3 -m json.tool "$notebook" >/dev/null
          done
