# =============================================================================
# AQUINAS Toolkit -- Full Five-SET Pipeline Configuration
# =============================================================================
#
# Preserves the earlier full-dataset workflow. Copy this file over
# configs/default.yaml when running the all-SET classical pipeline.

data:
  dataset_root: AQUINAS_DATASET
  sets:
    - AQUINAS_SET1_2022_07
    - AQUINAS_SET2_2023_04
    - AQUINAS_SET3_2023_08
    - AQUINAS_SET4_2024_01
    - AQUINAS_SET5_2024_06

preprocessing:
  sampling_rate_hz: 100.0                  # Raw signal sampling rate in Hz; converts sample counts to seconds and FFT bins.
  strain:
    locations: [INF, SHE, SUP]             # Strain-type sensor locations included in NN preprocessing.
    filter:
      method: none                         # Strain filtering policy; none means strain is not band-pass filtered.
    zeroing:
      method: linear_endpoints             # Strain baseline removal; subtracts the endpoint line before alignment.
    peak_window_half_samples: 100          # Samples before and after the strain peak; total window is 2 * this value.
  acc:
    axis: Z                                # Acceleration axis included in NN preprocessing; ACC-Y is excluded.
    min_aligned_samples: 500               # Minimum ACC-Z aligned record length in samples; shorter records are discarded.
    clipping:
      method: none                         # ACC-Z clipping policy; none keeps high-amplitude but valid vehicle responses.
    filter:
      method: butterworth_bandpass         # ACC-Z time-domain filter applied before zeroing.
      low_hz: 0.5                          # ACC-Z band-pass lower cutoff in Hz.
      high_hz: 20.0                        # ACC-Z band-pass upper cutoff in Hz.
      order: 4                             # Butterworth filter order for ACC-Z.
    zeroing:
      method: linear_endpoints             # ACC-Z baseline removal after filtering; subtracts the endpoint line.
    time_padding:                          # ACC-Z time-domain padding settings used before FFT.
      method: max_retained_length          # ACC-Z padding policy before FFT; pads retained records to the longest retained length.
    frequency_transform:                   # ACC-Z frequency-domain neural input settings.
      method: fft_magnitude                # ACC-Z neural transform; stores FFT magnitude values.
      fft_length: max_retained_length      # FFT length policy; use the padded retained-event length.
      low_hz: 0.5                          # Lowest retained ACC-Z FFT frequency bin in Hz.
      high_hz: 20.0                        # Highest retained ACC-Z FFT frequency bin in Hz.
  event_grouping:
    key_fields: [deck, Start_Time, End_Time]
  sensor_overrides:
    exclude:
      - sensor_name: OLD_S1_UP_SUP_STR
        sets: [AQUINAS_SET4_2024_01, AQUINAS_SET5_2024_06]
        reason: damaged sensor per organizer email
        source: Francois-Baptiste Cartiaux email dated April 9, 2026
  alignment:
    method: r_synchro
  filtering:
    min_active_sensors_per_event: 1
  storage:
    backend: sqlite
  exports:
    aligned_waveforms:
      enabled: false
      format: csv.gz

features:
  sampling_rate_hz: 100.0
  modal_analysis:
    enabled: true
    quantity: ACC
    axis: Z
    min_common_events: 2
    max_events: 5
    require_full_channel_set: true
    low_hz: 0.5
    high_hz: 20.0
    nperseg: 1024
    noverlap: 512
    n_peaks: 3

output:
  results_dir: results
